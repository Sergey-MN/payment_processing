services:
  postgres:
    image: postgres:15-alpine
    container_name: pg_db
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}" ]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    build: .
    image: app_payment
    container_name: payment_cntr
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      uvicorn payments.main:app --host 0.0.0.0 --port 8000"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbit
    expose:
      - "5672"
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 30s
      timeout: 5s
      retries: 10

  producer:
    build: .
    container_name: prod_cntr
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: python -m outbox.producer


  consumer:
    build: .
    container_name: consumer
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: python -m consumer.consumer

volumes:
  pg_data:
  rabbitmq_data: